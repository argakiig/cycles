<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CYCLES — an idle game about automating yourself out</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>

  <header>
    <h1>CYCLES</h1>
    <p class="subtitle">an idle game about automating yourself out</p>
    <p class="status">
      <span id="act-status">act 1 / 3</span><span id="mult-status"></span>
    </p>
  </header>

  <main>
    <!-- system log: where the narrative lands -->
    <section class="panel log-panel">
      <h2>// system log</h2>
      <div id="log" class="log" aria-live="polite"></div>
    </section>

    <section class="panel play-panel">
      <div class="readout">
        <span id="cycles" class="cycles">0</span>
        <span id="unit" class="unit">cycles</span>
        <span id="rate" class="rate">+0 /s</span>
      </div>

      <div class="controls">
        <button id="click" class="btn btn-primary">
          ▶ <span id="lbl-click">run cycle</span>
          <span class="hint" id="hint-click">+1</span>
        </button>
        <div class="qty" id="qty">
          <button class="qty-btn active" data-mode="1">×1</button>
          <button class="qty-btn" data-mode="10">×10</button>
          <button class="qty-btn" data-mode="max">×Max</button>
        </div>
        <!-- buy buttons (one per tier) are generated by game.js -->
        <div id="buy-list"></div>
        <button id="break" class="btn btn-break" hidden>BREAK THE CYCLE</button>
      </div>

      <div class="stats">
        <!-- per-tier building rows are generated by game.js -->
        <div id="building-stats"></div>
        <div><span class="k">milestone</span><span id="n-milestone">×1</span></div>
        <div><span class="k" id="sl-total">total cycles</span><span id="n-total">0</span></div>
        <div><span class="k">manual inputs</span><span id="n-clicks">0</span></div>
      </div>
    </section>
  </main>

  <section class="panel upgrades-panel" id="upgrades-panel">
    <h2>// upgrades</h2>
    <div id="upgrades" class="upgrades"></div>
  </section>

  <section class="panel achievements-panel" id="workers-panel">
    <h2>// crew <span id="worker-count"></span></h2>
    <div id="workers" class="achievements"></div>
  </section>

  <section class="panel achievements-panel" id="achievements-panel">
    <h2>// achievements <span id="ach-count"></span></h2>
    <div id="achievements" class="achievements"></div>
  </section>

  <footer>
    <span class="auto-saved">progress autosaves to this browser</span>
    <button id="open-settings" class="btn-text">settings</button>
  </footer>

  <!-- ascension / ending overlay — content built by game.js -->
  <div id="overlay" class="ending" hidden>
    <div class="ending-card" id="overlay-card"></div>
  </div>

  <!-- settings & offline-progress modal — content built by game.js -->
  <div id="modal" class="ending" hidden>
    <div class="ending-card" id="modal-card"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
